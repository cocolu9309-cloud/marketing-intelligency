<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>callie.com 营销资讯中心</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <h1>🔥 callie.com 营销资讯中心</h1>
        <p class="subtitle">全球前沿营销玩法资讯 · 每日更新</p>
    </header>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索资讯标题或摘要...">
        <button id="searchBtn">🔍</button>
    </div>

    <div class="tabs" id="deptTabs">
        <button class="tab active" data-dept="all">全部</button>
        <button class="tab" data-dept="品牌">品牌 (50)</button>
        <button class="tab" data-dept="SEO">SEO (20)</button>
        <button class="tab" data-dept="广告投放">广告投放 (10)</button>
    </div>

    <div class="filters">
        <select id="typeFilter">
            <option value="all">全部类型</option>
            <option value="其他">其他 (56)</option>
            <option value="数据">数据报告 (11)</option>
            <option value="教程">案例分享/教程 (6)</option>
            <option value="工具">工具推荐 (5)</option>
            <option value="趋势">趋势/新玩法 (2)</option>
        </select>
        <select id="importanceFilter">
            <option value="all">全部重要程度</option>
            <option value="高">⭐⭐⭐ 必读</option>
            <option value="中">⭐⭐ 推荐</option>
            <option value="低">⭐ 了解</option>
        </select>
        <select id="timeFilter">
            <option value="all">全部时间</option>
            <option value="today">今天</option>
            <option value="week">本周</option>
            <option value="month">本月</option>
        </select>
    </div>

    <main id="articlesContainer" class="articles-container">
        <p class="loading">加载中...</p>
    </main>

    <footer class="footer">
        <p>callie.com 营销资讯中心 · 由 GitHub Actions 自动更新 · 最后更新：<span id="lastUpdated">-</span></p>
    </footer>

    <script src="./js/search.js"></script>
</body>
</html>
