name: Daily Crawl and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: pip install feedparser requests beautifulsoup4

      - name: Crawl
        run: python marketing-intelligence/scripts/crawl.py

      - name: Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.131.0'

      - name: Build to root
        run: |
          hugo --destination .
        working-directory: ./marketing-intelligence

      - name: Commit changes
        run: |
          git config user.name "Crawler"
          git config user.email "crawler@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto update site content $(date '+%Y-%m-%d %H:%M')"
          git push