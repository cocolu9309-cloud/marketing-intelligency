name: Daily Crawl and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: pip install feedparser requests beautifulsoup4

      - name: Crawl
        run: python marketing-intelligence/scripts/crawl.py

      - name: Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.131.0'

      - name: Build
        run: |
          rm -rf marketing-intelligence/public
          hugo -d marketing-intelligence/public
          ls -la marketing-intelligence/public/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: marketing-intelligence/public