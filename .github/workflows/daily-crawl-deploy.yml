name: Daily Crawl and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name "Crawler"
          git config user.email "crawler@github.com"
          git fetch origin main
          git merge origin/main --no-edit

      - name: Install deps
        run: pip install feedparser requests beautifulsoup4

      - name: Create data directories
        run: |
          mkdir -p data
          mkdir -p docs/data

      - name: Crawl articles
        run: python marketing-intelligence/scripts/crawl.py

      - name: Copy articles.json to docs
        run: |
          mkdir -p docs/data
          cp marketing-intelligence/data/articles.json docs/data/articles.json

      - name: Apply title translations
        run: python scripts/apply_title_translations.py

      - name: Commit and push
        run: |
          git add docs/data/articles.json marketing-intelligence/data/articles.json title_translations.json scripts/
          git diff --staged --quiet || git commit -m "chore: auto update articles $(date '+%Y-%m-%d %H:%M')"
          git push --force-with-lease origin main