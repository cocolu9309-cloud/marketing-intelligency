name: Daily Crawl and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨 1 点 UTC = 北京时间 9 点
  workflow_dispatch:       # 手动触发

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./marketing-intelligence
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install feedparser requests beautifulsoup4

      - name: Run crawler
        run: python scripts/crawl.py

      - name: Generate Chinese summaries
        run: python scripts/improve_summaries.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.131.0'

      - name: Build Hugo site
        run: |
          rm -rf public
          hugo --cleanDestinationDir --destination public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public