name: Daily Crawl and Translate

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git config user.name "Crawler"
          git config user.email "crawler@github.com"
          git fetch origin main
          # 只更新articles.json，不影响其他文件
          git checkout origin/main -- data/articles.json docs/data/articles.json 2>/dev/null || true

      - name: Install deps
        run: pip install feedparser requests beautifulsoup4

      - name: Create data directories
        run: |
          mkdir -p data
          mkdir -p docs/data

      - name: Crawl articles
        run: python scripts/crawl.py

      - name: LLM translation - generate Chinese summaries
        run: python scripts/improve_summaries.py

      - name: Copy articles.json to docs
        run: |
          mkdir -p docs/data
          cp data/articles.json docs/data/articles.json

      - name: Commit and push
        run: |
          git add docs/data/articles.json data/articles.json
          git diff --staged --quiet || git commit -m "chore: auto update articles $(date '+%Y-%m-%d %H:%M')"
          git push --force-with-lease origin main